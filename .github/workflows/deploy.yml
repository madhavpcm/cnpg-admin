name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. myorg/cnpg-admin

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # needed to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha_tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Roll Out to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    # Only deploy if you have a kubeconfig secret configured
    # If the secret is missing, this job is skipped gracefully.
    if: ${{ secrets.KUBECONFIG != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -f deploy/manifests.yaml

      # Patch the image to the exact SHA — triggers a rolling update
      - name: Update image
        run: |
          kubectl set image deployment/cnpg-admin \
            cnpg-admin=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n cnpg-system

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cnpg-admin \
            -n cnpg-system \
            --timeout=120s
