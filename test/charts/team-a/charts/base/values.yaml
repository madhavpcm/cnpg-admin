cluster:
  name: cnpg-cluster
  namespace: default
  postgresql:
    version: "16"
    image: ghcr.io/cloudnative-pg/postgresql:16
  instances: 3
  storage:
    size: 10Gi
    storageClass: standard
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 1Gi
  backup:
    enabled: false
    retention: 7d
  monitoring:
    enabled: true
    prometheusRuleEnabled: false
  affinity:
    topologyKey: kubernetes.io/hostname
    podAntiAffinity: preferred
  serviceAccount:
    create: true
    name: ""
