apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-admin
  namespace: cnpg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-admin
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "poolers", "backups"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-admin
subjects:
  - kind: ServiceAccount
    name: cnpg-admin
    namespace: cnpg-system
roleRef:
  kind: ClusterRole
  name: cnpg-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: cnpg-admin
  namespace: cnpg-system
spec:
  selector:
    app: cnpg-admin
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnpg-admin
  namespace: cnpg-system
  annotations:
    # bumped by CI: kubectl set image deployment/cnpg-admin cnpg-admin=<image>:<sha>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnpg-admin
  template:
    metadata:
      labels:
        app: cnpg-admin
    spec:
      serviceAccountName: cnpg-admin
      containers:
        - name: cnpg-admin
          image: cnpg-admin:latest  # local: replaced by local-deploy.sh; CI: ghcr.io/OWNER/cnpg-admin:<sha>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
